<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/plantilla :: head">
    <title>Agendar Cita</title>
</head>
<body>
    <header th:replace="layout/plantilla :: header"/>
    <h1>Agendar Cita</h1>
    <form action="/appointments" method="post">
        <label for="clientName">Nombre del Cliente:</label>
        <input type="text" id="clientName" name="clientName" required><br>
        <label for="appointmentDate">Fecha de la Cita:</label>
        <input type="date" id="appointmentDate" name="appointmentDate" required><br>
        <label for="details">Detalles:</label>
        <textarea id="details" name="details" required></textarea><br>
        <button type="submit">Agendar</button>
    </form>
</body>
</html>
